{% extends "base.html" %}
{% block title %}Order History{% endblock %}

{% block content %}
<div class="card shadow p-4">
  <h3 class="mb-3">Order History</h3>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Store</th>
        <th>Supplier</th>
        <th>Product</th>
        <th>Order Qty</th>
      </tr>
    </thead>
    <tbody>
      {% for order in orders %}
      <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.store }}</td>
        <td>{{ order.supplier }}</td>
        <td>{{ order.product_code }}</td>
        <td>{{ order.order_qty }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
